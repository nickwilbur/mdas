services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: mdas
      POSTGRES_PASSWORD: mdas
      POSTGRES_DB: mdas
    ports:
      - "5432:5432"
    volumes:
      - mdas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mdas -d mdas"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      DATABASE_URL: postgres://mdas:mdas@db:5432/mdas
      NODE_ENV: production
      ADAPTER_SALESFORCE: ${ADAPTER_SALESFORCE:-mock}
      ADAPTER_CEREBRO: ${ADAPTER_CEREBRO:-mock}
      ADAPTER_GAINSIGHT: ${ADAPTER_GAINSIGHT:-mock}
      ADAPTER_STAIRCASE: ${ADAPTER_STAIRCASE:-mock}
      ADAPTER_ZUORA_MCP: ${ADAPTER_ZUORA_MCP:-mock}
      ADAPTER_GLEAN_MCP: ${ADAPTER_GLEAN_MCP:-mock}
      # In-app Glean integration (server-side proxy in /api/glean/*).
      # Web container needs these so the Next.js route handlers can
      # call Glean's REST API on the user's behalf. Same values the
      # worker uses; ${VAR-} keeps the var absent (not empty) when
      # unset on the host so readGleanCredsFromEnv() returns null.
      AUTH_MODE: ${AUTH_MODE:-none}
      GLEAN_MCP_TOKEN: ${GLEAN_MCP_TOKEN-}
      GLEAN_MCP_BASE_URL: ${GLEAN_MCP_BASE_URL-}
      # Corporate TLS interception bundle (same rationale as the
      # worker service below — Glean's *.glean.com endpoints often
      # transit Zscaler in corp networks).
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-/etc/mdas-extra-ca.pem}
    volumes:
      - ./.docker-ca.pem:/etc/mdas-extra-ca.pem:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      # docker-internal DB URL — overrides the host .env's localhost form.
      DATABASE_URL: postgres://mdas:mdas@db:5432/mdas
      # Adapter on/off flags. ${VAR:-mock} → safe default if .env unset.
      ADAPTER_SALESFORCE: ${ADAPTER_SALESFORCE:-mock}
      ADAPTER_CEREBRO: ${ADAPTER_CEREBRO:-mock}
      ADAPTER_GAINSIGHT: ${ADAPTER_GAINSIGHT:-mock}
      ADAPTER_STAIRCASE: ${ADAPTER_STAIRCASE:-mock}
      ADAPTER_ZUORA_MCP: ${ADAPTER_ZUORA_MCP:-mock}
      ADAPTER_GLEAN_MCP: ${ADAPTER_GLEAN_MCP:-mock}
      # Adapter credentials. Forwarded from host .env (which is gitignored).
      # When unset on the host, the variable is simply absent inside the
      # container — the adapters detect that and fall back to mock or no-op
      # gracefully (verified in PR-8 smoke).
      SALESFORCE_CLIENT_ID: ${SALESFORCE_CLIENT_ID-}
      SALESFORCE_CLIENT_SECRET: ${SALESFORCE_CLIENT_SECRET-}
      SALESFORCE_REFRESH_TOKEN: ${SALESFORCE_REFRESH_TOKEN-}
      SALESFORCE_INSTANCE_URL: ${SALESFORCE_INSTANCE_URL-}
      GLEAN_MCP_TOKEN: ${GLEAN_MCP_TOKEN-}
      GLEAN_MCP_BASE_URL: ${GLEAN_MCP_BASE_URL-}
      GAINSIGHT_GLEAN_CONNECTOR: ${GAINSIGHT_GLEAN_CONNECTOR-true}
      ZUORA_MCP_CLIENT_ID: ${ZUORA_MCP_CLIENT_ID-}
      ZUORA_MCP_CLIENT_SECRET: ${ZUORA_MCP_CLIENT_SECRET-}
      ZUORA_MCP_BASE_URL: ${ZUORA_MCP_BASE_URL-}
      SCORING_VERSION: ${SCORING_VERSION:-v0.1.0}
      # Corporate TLS interception (Zscaler etc.). When the host has
      # exported its corp root CAs to .docker-ca.pem, point Node at
      # them. Empty value = use bundled Mozilla CAs only (works only
      # when the host is on a non-MITM'd network).
      NODE_EXTRA_CA_CERTS: ${NODE_EXTRA_CA_CERTS:-/etc/mdas-extra-ca.pem}
    volumes:
      # Mount the host's exported corporate CA bundle into the
      # container at the path NODE_EXTRA_CA_CERTS expects. The bind
      # uses :ro and is non-fatal if the file doesn't exist on the
      # host — Docker will create an empty file there, which Node
      # ignores cleanly.
      - ./.docker-ca.pem:/etc/mdas-extra-ca.pem:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  mdas_pgdata:
