name: cse-activity-weekly

on:
  schedule:
    # Friday 5:00 PM America/Denver — 00:00 UTC Saturday during MDT (approx; adjust for DST as needed)
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mdas
          POSTGRES_PASSWORD: mdas
          POSTGRES_DB: mdas
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mdas -d mdas" --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://mdas:mdas@localhost:5432/mdas
      ADAPTER_SALESFORCE: mock
      ADAPTER_CEREBRO: mock
      ADAPTER_GAINSIGHT: mock
      ADAPTER_STAIRCASE: mock
      ADAPTER_ZUORA_MCP: mock
      ADAPTER_GLEAN_MCP: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci || npm install
      - run: npm run migrate && npm run seed
      - name: Refresh MDAS (includes glean-mcp enrichment)
        run: npm --workspace apps/worker run refresh-once
      - run: npm --workspace apps/web run build
      - name: Generate CSE activity snapshot via API
        run: |
          npm --workspace apps/web run start &
          for i in $(seq 1 30); do
            curl -fsS http://localhost:3000/ > /dev/null && break
            sleep 1
          done
          curl -fsS -X POST http://localhost:3000/api/cse-activity/snapshot
          kill %1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: cse-activity-snapshot
          path: reports/cse_activity_snapshots/
          retention-days: 90
